    <script>
      // Fix for LeadConnector widget trying to override read-only window.fetch
      (function() {
        try {
          const originalFetch = window.fetch;
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          
          if (!descriptor || descriptor.configurable) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn('Aldosia: Blocked attempt to override fetch.');
                // Some scripts expect the assignment to "work" even if ignored
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Aldosia: Could not define fetch proxy.', e);
        }
      })();
    </script>
