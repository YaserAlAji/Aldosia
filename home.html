    <script>
      // Fix for LeadConnector or other widgets trying to override read-only window.fetch
      (function() {
        var _fetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return _fetch; },
            set: function(v) { _fetch = v; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Aldosia: Could not patch fetch.', e);
        }
      })();
    </script>
